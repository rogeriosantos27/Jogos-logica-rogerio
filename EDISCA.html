<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDISCA: Uma aventura educativa pelos caminhos da EDISCA.</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --dark: #292f36;
            --light: #f7fff7;
            --accent: #ffe66d;
            --ui-bg: rgba(28, 33, 41, 0.96);
            --ui-border: #ffe66d;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            user-select: none; -webkit-user-select: none;
        }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #11141a; color: var(--light);
        }

        #game-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        canvas {
            display: block; image-rendering: pixelated;
            width: 100%; height: 100%;
        }

        /* UI e Modais */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; 
            background: radial-gradient(circle, #2d5a57 0%, #11141a 100%);
            transition: opacity 0.5s;
        }

        h1 { font-size: 3.5rem; color: var(--accent); text-shadow: 4px 4px 0px var(--primary), 8px 8px 0px var(--dark); margin-bottom: 10px; text-align: center; }
        h2 { font-size: 1.5rem; background: var(--primary); padding: 5px 15px; border-radius: 10px; border: 3px solid var(--dark); margin-bottom: 20px; text-align: center;}

        .form-card {
            background: var(--ui-bg); border: 4px solid var(--ui-border); border-radius: 16px;
            padding: 30px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 3px solid var(--secondary);
            font-size: 1.2rem; font-weight: bold; text-align: center; margin-bottom: 20px; outline: none;
            font-family: 'Courier New', Courier, monospace;
            background: #fff; color: #000;
        }

        .game-btn {
            background: var(--primary); color: var(--light); border: 3px solid var(--dark);
            padding: 12px 25px; font-size: 1.2rem; font-weight: bold; border-radius: 12px;
            cursor: pointer; box-shadow: 4px 4px 0px var(--dark); text-transform: uppercase;
            font-family: 'Courier New', Courier, monospace;
        }
        .game-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--dark); }

        /* HUD Principal */
        #hud {
            position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 5; pointer-events: none;
        }

        .hud-panel {
            background: var(--ui-bg); border: 3px solid var(--ui-border); border-radius: 12px;
            padding: 10px 15px; display: inline-flex; align-items: center; gap: 10px;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .hud-medals { display: flex; flex-wrap: wrap; gap: 5px; max-width: 320px; }
        .medal-icon {
            width: 32px; height: 32px; background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; opacity: 0.4;
            transition: all 0.3s ease;
        }
        .medal-icon.active {
            opacity: 1; border: 2px solid var(--accent); background: radial-gradient(circle, #ffe66d 0%, #fca311 100%);
            box-shadow: 0 0 12px var(--accent);
            transform: scale(1.1);
        }

        #tutorial-hud {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8);
            border: 2px solid var(--secondary); padding: 10px; border-radius: 10px;
            color: #fff; font-size: 0.9rem; text-align: right; z-index: 5;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Diálogos */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 20;
        }
        .dialog-box {
            background: var(--ui-bg); border: 5px solid var(--ui-border); border-radius: 20px;
            width: 90%; max-width: 700px; max-height: 90vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .dialog-header { background: #1a1e24; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 3px solid var(--ui-border); }
        .dialog-avatar { width: 60px; height: 60px; background: var(--primary); border: 3px solid var(--accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; }
        .dialog-body { padding: 25px; font-size: 1.1rem; line-height: 1.6; overflow-y: auto; color: var(--light); }
        .dialog-footer { padding: 15px; background: rgba(0,0,0,0.3); display: flex; justify-content: flex-end; gap: 10px; border-top: 2px solid rgba(255,255,255,0.1); }
        .option-btn { background: var(--dark); border: 2px solid var(--secondary); color: var(--light); padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; text-align: left; font-size: 1rem; width: 100%; font-family: 'Courier New', Courier, monospace; transition: all 0.2s; }
        .option-btn:hover { background: var(--secondary); color: var(--dark); font-weight: bold; transform: translateX(5px); }

        #interaction-prompt {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: var(--ui-bg); border: 3px solid var(--primary); padding: 12px 24px;
            border-radius: 24px; font-weight: bold; display: none; z-index: 5; animation: pulse 1s infinite;
            text-align: center; color: var(--light);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }

        /* Controles Virtuais */
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 5; pointer-events: none; }
        .dpad, .action-pad { pointer-events: auto; }
        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 5px; }
        .ctrl-btn { background: rgba(0,0,0,0.7); border: 3px solid rgba(255,255,255,0.7); border-radius: 10px; color: white; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .ctrl-btn:active { background: var(--secondary); }
        .btn-up { grid-column: 2; grid-row: 1; } .btn-left { grid-column: 1; grid-row: 2; } .btn-down { grid-column: 2; grid-row: 3; } .btn-right { grid-column: 3; grid-row: 2; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); border: 4px solid var(--accent); color: var(--dark); font-weight: bold; display: flex; justify-content: center; align-items: center; align-self: flex-end; margin-bottom: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .action-btn:active { transform: scale(0.9); }
        @media (min-width: 800px) { #controls { display: none; } }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="start-screen" class="screen">
        <h1>EDISCA</h1>
        <h2>Uma aventura educativa pelos caminhos da EDISCA.</h2>
        <div class="form-card">
            <p style="margin-bottom: 15px; color: var(--accent);">Identifique-se, educando(a):</p>
            <input type="text" id="player-name" value="Bailarino(a)" maxlength="15">
            <button class="game-btn" onclick="startGame()">Iniciar</button>
        </div>
    </div>

    <div id="hud" style="display: none;">
        <div class="hud-panel">
            <strong id="hud-name" style="color: var(--accent);">Jogador</strong>
            <span id="hud-score" style="margin-left: 10px;">⭐ 0</span>
        </div>
        <div class="hud-panel hud-medals" id="medals-container"></div>
    </div>

    <div id="tutorial-hud" style="display: none;">
        ⌨️ <b>WASD / Setas</b> para Andar<br>
        🔘 <b>Espaço</b> para Falar/Interagir
    </div>

    <div id="interaction-prompt">Aperte ESPAÇO para falar</div>

    <div id="controls" style="display: none;">
        <div class="dpad">
            <div class="ctrl-btn btn-up" id="btn-up">▲</div>
            <div class="ctrl-btn btn-left" id="btn-left">◀</div>
            <div class="ctrl-btn btn-right" id="btn-right">▶</div>
            <div class="ctrl-btn btn-down" id="btn-down">▼</div>
        </div>
        <div class="action-pad">
            <div class="action-btn" id="btn-action">AÇÃO</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="dialog-overlay" class="modal-overlay">
        <div class="dialog-box">
            <div class="dialog-header">
                <div class="dialog-avatar" id="dialog-icon">👤</div>
                <div>
                    <div id="dialog-npc" style="font-weight: bold; color: var(--accent); font-size: 1.2rem;">NPC</div>
                    <div id="dialog-room" style="font-size: 0.9rem; opacity: 0.8;">Sala</div>
                </div>
            </div>
            <div class="dialog-body" id="dialog-content"></div>
            <div class="dialog-footer" id="dialog-actions"></div>
        </div>
    </div>
</div>

<script>
    // ==========================================================================
    // 1. MOTOR DO JOGO
    // ==========================================================================
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const TILE = 40;
    const COLS = 70;
    const ROWS = 65;
    const MAP_W = COLS * TILE;
    const MAP_H = ROWS * TILE;
    let map = [];
    let camX = 0, camY = 0;

    // Elementos estéticos adicionais para simular vento e vida ambiental
    let leafParticles = [];
    let butterflyParticles = [];
    let birdParticles = [];
    
    function initAmbientParticles() {
        // Inicializa folhas ao vento
        for (let i = 0; i < 60; i++) {
            leafParticles.push({
                x: Math.random() * MAP_W,
                y: Math.random() * MAP_H,
                size: Math.random() * 3 + 2,
                speedX: Math.random() * 1 + 0.5,
                speedY: Math.random() * 0.5 + 0.2,
                color: ["#4d7c0f", "#a3e635", "#84cc16", "#ca8a04"][Math.floor(Math.random() * 4)]
            });
        }
        // Inicializa borboletas
        for (let i = 0; i < 20; i++) {
            butterflyParticles.push({
                x: Math.random() * MAP_W,
                y: Math.random() * MAP_H,
                wingCycle: Math.random() * Math.PI,
                color: ["#ffe66d", "#4ecdc4", "#ff6b6b"][Math.floor(Math.random() * 3)],
                speedX: (Math.random() - 0.5) * 0.8,
                speedY: (Math.random() - 0.5) * 0.8
            });
        }
        // Inicializa passarinhos ocasionais
        for (let i = 0; i < 5; i++) {
            birdParticles.push({
                x: Math.random() * MAP_W,
                y: Math.random() * 10 * TILE,
                wing: 0,
                speed: Math.random() * 1.5 + 1
            });
        }
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => {
        resizeCanvas();
        if (window.innerWidth < 800 && document.getElementById("start-screen").style.display === "none") {
            document.getElementById("controls").style.display = "flex";
        } else {
            document.getElementById("controls").style.display = "none";
        }
    });
    resizeCanvas();

    // ==========================================================================
    // 2. GERAÇÃO DO MAPA
    // ==========================================================================
    function initMap() {
        for (let r = 0; r < ROWS; r++) {
            map[r] = [];
            for (let c = 0; c < COLS; c++) {
                if (r < 2 || r > ROWS-3 || c < 2 || c > COLS-3) map[r][c] = 4; // Água
                else map[r][c] = 0; // Grama
            }
        }

        const build = (r1, r2, c1, c2) => {
            for (let r = r1; r <= r2; r++) {
                for (let c = c1; c <= c2; c++) {
                    map[r][c] = (r===r1 || r===r2 || c===c1 || c===c2) ? 1 : 3;
                }
            }
            map[r2][Math.floor((c1+c2)/2)] = 3; map[r2][Math.floor((c1+c2)/2)-1] = 3; 
        };

        build(5, 12, 30, 40); // Portaria
        build(17, 24, 10, 20); // Secretaria
        build(17, 24, 50, 60); // Diretoria
        build(29, 36, 10, 20); // Cozinha
        build(29, 36, 50, 60); // Reforço
        build(41, 48, 10, 20); // Financeiro
        build(41, 48, 50, 60); // Artes
        
        // Novas salas adicionadas de forma simétrica ao redor do caminho central
        build(17, 24, 22, 29); // TI
        build(17, 24, 41, 48); // Brechó "Segundo Ato"
        build(29, 36, 22, 29); // Comunicação e Marketing
        build(29, 36, 41, 48); // Refeitório

        build(53, 60, 20, 30); // Dança
        build(53, 60, 40, 50); // Teatro/Espetáculo
        build(53, 60, 5, 15);  // Saúde
        build(53, 60, 55, 65); // Biblioteca
        
        // Jardim com abertura (Área de Manutenção)
        build(58, 62, 32, 38);
        map[58][34] = 0; map[58][35] = 2; map[58][36] = 2; 

        // Caminhos Principais
        for(let r=12; r<58; r++) {
            for(let c=32; c<=38; c++) map[r][c] = 2;
        }
        for(let c=20; c<50; c++) {
            for(let r=25; r<=27; r++) map[r][c] = 2; 
            for(let r=37; r<=39; r++) map[r][c] = 2; 
            for(let r=49; r<=51; r++) map[r][c] = 2; 
        }
    }

    // ==========================================================================
    // 3. DESAFIOS (Focados na Rotina da EDISCA)
    // ==========================================================================
    const questsData = {
        portaria: { room: "Portaria", npcs: ["Prof. Junior", "Prof. Cris"], icon: "🚪",
            intro: "Bem-vindos à portaria da EDISCA! Somos o Professor Junior e o Professor Cris. Nosso trabalho é garantir a segurança e o acesso correto de todos. Vamos testar sua lógica de organização?",
            questions: [
                { q: "Se a turma A tem 20 alunos e a turma B tem 15, e cada aluno leva 10 segundos para passar a carteirinha na catraca, qual turma libera a portaria mais rápido?", opts: ["Turma A", "Turma B", "As duas ao mesmo tempo", "Depende do dia"], ans: 1, exp: "A Turma B tem menos alunos, portanto, o tempo total de passagem na catraca será menor." },
                { q: "Um educando esqueceu a carteirinha em casa. A regra de segurança diz que sem identificação não há acesso direto. Qual o procedimento lógico?", opts: ["Pular a catraca", "Voltar para casa", "Avisar a secretaria e solicitar liberação provisória", "Entrar junto com um amigo"], ans: 2, exp: "A comunicação com a secretaria garante o controle seguro de quem está dentro da instituição." },
                { q: "O ensaio termina às 17h30. Os pais começam a chegar 15 minutos antes. A que horas a portaria deve organizar a área de espera?", opts: ["17h00", "17h15", "17h30", "17h45"], ans: 1, exp: "Se eles chegam 15 minutos antes das 17h30, a recepção deve estar pronta às 17h15." },
                { q: "Por que não podemos deixar as portas principais totalmente abertas sem monitoramento durante as aulas?", opts: ["Para o ar condicionado não vazar", "Por medidas rigorosas de proteção aos educandos", "Para não entrar poeira", "Porque a porta quebra"], ans: 1, exp: "A prioridade número um da portaria é a segurança física de todos os alunos e funcionários." },
                { q: "Se 3 ônibus fretados chegam com 40 alunos cada, e temos 2 catracas funcionando. Quantos alunos passarão, em média, por cada catraca?", opts: ["40", "60", "80", "120"], ans: 1, exp: "Total de 120 alunos (3x40). Dividido por 2 catracas, são 60 alunos por catraca." }
            ]},
        secretaria: { room: "Secretaria", npcs: ["Profª Gesliane"], icon: "🗂️",
            intro: "Oi, aqui é a Professora Gesliane! Cuidamos de toda a documentação, presenças e matrículas para que vocês possam estudar em paz. Me ajude com a rotina administrativa!",
            questions: [
                { q: "Temos 100 pastas de alunos e precisamos organizá-las em ordem alfabética. A pasta da 'Ana' e do 'Bruno' já estão no lugar. Onde entra a pasta da 'Beatriz'?", opts: ["Antes da Ana", "Depois do Bruno", "Entre Ana e Bruno", "No final"], ans: 2, exp: "Na ordem alfabética, 'Beatriz' (Be) vem depois de 'Ana' (An) e antes de 'Bruno' (Br)." },
                { q: "Para manter a bolsa, o aluno precisa de 75% de presença. Se o mês tem 20 aulas, qual é o número MÁXIMO de faltas que ele pode ter?", opts: ["3 faltas", "5 faltas", "7 faltas", "10 faltas"], ans: 1, exp: "75% de 20 é 15 aulas. Portanto, ele pode faltar no máximo 5 vezes (20 - 15 = 5)." },
                { q: "Um edital exige RG, CPF e Comprovante de Residência de cada aluno. Se vamos matricular 30 novos educandos, quantos documentos, no total, a secretaria precisará arquivar?", opts: ["30", "60", "90", "120"], ans: 2, exp: "São 3 documentos por aluno. 30 alunos x 3 = 90 documentos processados com muito cuidado!" },
                { q: "Se um pai liga perguntando sobre o calendário de férias, qual documento a secretaria consulta para dar a informação exata?", opts: ["Livro de presenças", "Calendário letivo institucional", "Lista de materiais", "O cardápio da cozinha"], ans: 1, exp: "O calendário letivo é o documento oficial que rege todas as datas da instituição." },
                { q: "A atualização de dados cadastrais ocorre a cada semestre. Se estamos em fevereiro, a próxima atualização será em:", opts: ["Março", "Agosto", "Dezembro", "Outubro"], ans: 1, exp: "Um semestre tem 6 meses. Fevereiro (mês 2) + 6 meses = Agosto (mês 8)." }
            ]},
        diretoria: { room: "Diretoria", npcs: ["Profª Andrea", "Profª Claudia", "Dirª Dora", "Profª Amanda"], icon: "🏢",
            intro: "Olá! Somos Andrea, Claudia, Dora e Amanda. Como líderes da instituição, planejamos o futuro da EDISCA, buscamos parcerias e mantemos nossos projetos vivos. Vamos testar sua visão estratégica?",
            questions: [
                { q: "A EDISCA precisa planejar um novo espetáculo. Qual a sequência lógica de planejamento?", opts: ["Ensaiar > Apresentar > Captar Recursos", "Captar Recursos > Criar > Ensaiar > Apresentar", "Apresentar > Criar > Captar Recursos", "Criar > Apresentar > Ensaiar"], ans: 1, exp: "Sem recursos e sem criação, não há ensaio. E o espetáculo é a etapa final de todo esse esforço." },
                { q: "Para garantir que a escola continue funcionando por anos, a diretoria prioriza:", opts: ["Gastar todo o recurso em um único evento", "Sustentabilidade financeira e planejamento a longo prazo", "Fazer apenas reuniões sem ação", "Não ter parceiros"], ans: 1, exp: "A sustentabilidade garante que as futuras gerações de alunos também tenham as mesmas oportunidades." },
                { q: "Temos uma reunião com 3 possíveis patrocinadores. Cada um exige um relatório de impacto social diferente. Quantos relatórios precisamos preparar?", opts: ["1 geral", "Nenhum", "3 personalizados", "10"], ans: 2, exp: "Se cada um exige um formato diferente, devemos honrar o compromisso preparando 3 relatórios específicos." },
                { q: "A missão da EDISCA envolve arte e educação. Se tivermos que cortar custos, qual área NÃO pode ser comprometida?", opts: ["O desenvolvimento e bem-estar dos educandos", "A pintura externa do muro", "Decorações de escritório", "Troca de móveis da diretoria"], ans: 0, exp: "Vocês, educandos, são o coração do nosso projeto. O investimento no bem-estar de vocês é intocável." },
                { q: "Se um projeto social dura 2 anos e é avaliado trimestralmente. Quantas avaliações a diretoria fará até o fim do projeto?", opts: ["4", "6", "8", "12"], ans: 2, exp: "Cada ano tem 4 trimestres. Em 2 anos, são 8 avaliações para garantir o sucesso do projeto." }
            ]},
        cozinha: { room: "Cozinha", npcs: ["Profª Aurea", "Profª Daiane"], icon: "🍳",
            intro: "Cheirinho de comida boa! Somos as Professoras Aurea e Daiane. Preparamos a alimentação nutritiva que dá energia para vocês dançarem. Vamos calcular nossa rotina?",
            questions: [
                { q: "Para fazer o lanche de 1 turma, usamos 2 pacotes de macarrão. Hoje temos 5 turmas para alimentar. Quantos pacotes precisamos?", opts: ["5", "7", "10", "12"], ans: 2, exp: "5 turmas x 2 pacotes = 10 pacotes de macarrão. Ninguém pode ficar com fome!" },
                { q: "A distribuição da refeição exige higiene rigorosa. Qual a ordem correta antes de servir?", opts: ["Servir > Lavar as mãos > Cozinhar", "Lavar as mãos > Colocar touca > Cozinhar > Servir", "Cozinhar > Comer > Servir", "Lavar os alimentos depois de picar"], ans: 1, exp: "A higienização (mãos e cabelo) é o primeiro passo para garantir a segurança alimentar de todos." },
                { q: "Temos 150 maçãs e 150 alunos. Cada aluno recebe uma maçã. Se 10 alunos faltaram, quantas maçãs sobrarão na cozinha?", opts: ["Nenhuma", "5", "10", "15"], ans: 2, exp: "Se temos 150 e entregamos 140, sobram 10. Evitamos desperdício guardando corretamente!" },
                { q: "Um suco precisa de 1 litro de polpa para cada 4 litros de água. Se vamos usar 2 litros de polpa, quanta água precisamos?", opts: ["4 litros", "6 litros", "8 litros", "10 litros"], ans: 2, exp: "Se a proporção é 1 para 4. Dobrando a polpa (2), dobramos a água (8)." },
                { q: "Por que o cardápio da EDISCA é planejado por nutricionistas semanas antes?", opts: ["Para comprar os ingredientes com antecedência e garantir o valor nutricional", "Porque é mais fácil cozinhar qualquer coisa na hora", "Para esconder a comida", "Para fazer sempre a mesma comida"], ans: 0, exp: "Planejamento garante economia na compra e refeições balanceadas para a saúde de vocês." }
            ]},
        financeiro: { room: "Financeiro", npcs: ["Profª Clecia", "Profª Vanessa", "Profª Flaviane"], icon: "💰",
            intro: "Bem-vindos ao coração financeiro da escola! Somos as Professoras Clecia, Vanessa e Flaviane. Cuidamos para que o dinheiro doado se transforme em arte e estrutura. Calcule conosco:",
            questions: [
                { q: "Recebemos uma doação de R$ 1.000,00. Precisamos comprar 10 figurinos que custam R$ 80,00 cada. Quanto sobrará no caixa da escola?", opts: ["R$ 100,00", "R$ 200,00", "R$ 300,00", "Não sobra nada"], ans: 1, exp: "10 x 80 = 800. 1000 - 800 = R$ 200,00 de saldo positivo para a instituição!" },

        reforco: { room: "Reforço Escolar", npcs: ["Prof. Rogério"], icon: "📐",

            questions: [

                { q: "Na interpretação de texto: 'A dedicação no balé reflete na disciplina escolar'. O que essa frase significa na prática?", opts: ["O balé atrapalha os estudos", "Quem tem disciplina na arte, naturalmente aplica essa organização nos cadernos e notas", "Balé é só diversão", "A escola não importa"], ans: 1, exp: "A concentração exigida pela dança desenvolve habilidades cognitivas úteis para as disciplinas regulares." },

                { q: "Um cronograma de estudos eficiente deve intercalar:", opts: ["Matérias fáceis e difíceis, com pequenas pausas", "Apenas a matéria que se gosta por 6 horas seguidas", "Estudar com a TV ligada", "Estudar na véspera da prova"], ans: 0, exp: "As pausas e a variação de matérias ajudam o cérebro a fixar melhor o conteúdo, sem sobrecarga." },

        artes: { room: "Ateliê de Artes e Desenhos", npcs: ["Profª Gislene"], icon: "🎨",
            intro: "Bem-vindos ao ateliê de artes! Sou a Professora Gislene. Aqui transformamos papel, tintas e criatividade em lindos desenhos, pinturas e cenários para os nossos espetáculos. Preparados?",
            questions: [
                { q: "Para desenhar um cenário com sensação de profundidade e distância, qual técnica de desenho devemos utilizar?", opts: ["Perspectiva linear com ponto de fuga", "Pintura abstrata", "Desenho às cegas", "Contorno simples"], ans: 0, exp: "A perspectiva com ponto de fuga é a técnica clássica do desenho para criar a illusions de profundidade tridimensional em uma folha plana." },
                { q: "O cenário do espetáculo representa uma floresta viva. Misturando as tintas azul e amarela em nossa paleta, qual cor secundária obteremos para pintar as folhagens?", opts: ["Roxo", "Laranja", "Verde", "Marrom"], ans: 2, exp: "A mistura das cores primárias azul e amarelo gera a cor secundária verde, perfeita para os elementos da natureza!" },
                { q: "Para fazer sombreados suaves e degradês realistas em um desenho a grafite, qual tipo de lápis é o mais adequado por ter a grafite mais macia e escura?", opts: ["Lápis 2H", "Lápis HB", "Lápis 6B", "Lapiseira 0.5 com grafite duro"], ans: 2, exp: "Os lápis da linha B (como o 6B) possuem grafite mais macia e escura, ideal para criar sombras, profundidade e texturas no papel." },
                { q: "Estamos desenhando uma máscara teatral simétrica. O que significa garantir a simetria no desenho?", opts: ["Fazer um lado completamente diferente do outro", "Garantir que os dois lados divididos ao meio sejam correspondentes e equilibrados", "Pintar tudo com uma única cor", "Desenhar sem usar linhas"], ans: 1, exp: "A simetria em artes visuais cria um equilíbrio perfeito, onde o lado esquerdo espelha o lado direito harmoniosamente." },
                { q: "Para pintar um cenário que transmita energia, calor e alegria, a professora Gislene sugere usar cores quentes. Quais são as principais cores desse grupo?", opts: ["Azul, verde e roxo", "Preto, branco e cinza", "Vermelho, laranja e amarelo", "Rosa, lilás e prata"], ans: 2, exp: "Vermelho, laranja e amarelo são cores quentes, associadas ao fogo e ao sol, excelentes para transmitir vibração e energia em uma obra de arte." }
            ]},
        danca: { room: "Sala de Dança", npcs: ["Prof. Anderson", "Prof. Jessy", "Prof. Vitor", "Prof. Daniel"], icon: "🩰",
            intro: "Fala, artistas! Somos os Professores Anderson, Jessy, Vitor e Daniel. Na sala de dança usamos não só o corpo, mas muita matemática, contagem e ritmo espacial. Vamos aquecer a mente!",

                { q: "A coreografia pede uma formação em triângulo com 6 bailarinos. O vértice da frente tem 1 pessoa. Quantas pessoas devem ficar nas outras duas fileiras lógicas?", opts: ["2 na segunda e 3 na terceira", "1 na segunda e 4 na terceira", "3 na segunda e 2 na terceira", "Todos em círculo"], ans: 0, exp: "Formação em triângulo crescente: 1 na frente + 2 no meio + 3 atrás = 6 bailarinos." },
                { q: "Na música, contamos os tempos em blocos (oitos). Se uma sequência coreográfica leva quatro 'oitos' para terminar, quantos tempos musicais se passaram?", opts: ["16 tempos", "24 tempos", "32 tempos", "40 tempos"], ans: 2, exp: "4 blocos multiplicados por 8 tempos = 32 tempos cravados na música." },
                { q: "Você está no centro da sala e o professor pede para você usar todo o seu 'Cinesfera' (espaço pessoal). O que você deve fazer?", opts: ["Ficar imóvel", "Esticar braços e pernas em todas as direções ao redor do seu corpo", "Correr para a parede", "Sentar"], ans: 1, exp: "A cinesfera é a bolha imaginária que envolve o limite máximo de alcance dos seus membros sem sair do lugar." },
                { q: "Dois grupos vão cruzar a sala em diagonais opostas ao mesmo tempo. Para não baterem no centro, qual a regra lógica de ensaio?", opts: ["Fechar os olhos e correr", "O grupo A passa pela frente e o grupo B por trás", "Gritar enquanto cruza", "Parar no meio da sala"], ans: 1, exp: "A marcação de espaçamento e definição de quem passa pela frente evita acidentes nas travessias." },
                { q: "Se um *plié* exige que o joelho siga a linha da ponta do pé, o que acontece se o bailarino fechar o joelho para dentro?", opts: ["Fica mais bonito", "Ele ganha velocidade", "Risco de lesão no joelho e desalinhamento", "Nada acontece"], ans: 2, exp: "A anatomia humana exige alinhamento ósseo. Dançar com técnica é cuidar da própria saúde física." }

        teatro: { room: "Teatro", npcs: ["Coordenadora Mayra", "Profª Hariane", "Profª Adrielly", "Profª Gabrielle"], icon: "🎭",

            questions: [
                { q: "A iluminação de um espetáculo tem a Luz Frontal (ilumina o rosto) e a Contra-luz (ilumina de trás). Se quisermos criar apenas a silhueta escura do bailarino, o que o iluminador deve ligar?", opts: ["Luz Frontal", "Contra-luz", "Todas as luzes", "Deixar tudo no escuro total"], ans: 1, exp: "A contra-luz cria o efeito de 'sombra chinesa', destacando a silhueta sem mostrar o rosto." },
                { q: "No teatro, as laterais do palco de onde os bailarinos entram escondidos do público chamam-se 'Coxias'. Se um bailarino entra pela coxia da Esquerda e tem que sair pelo lado oposto, por onde ele sai?", opts: ["Pelo teto", "Pela coxia Direita", "Pelo fundo do palco", "Pela plateia"], ans: 1, exp: "O lado oposto da Esquerda do palco é sempre a coxia da Direita." },
                { q: "O espetáculo dura 60 minutos. A bailarina principal tem 2 minutos para trocar o figurino entre o Primeiro e o Segundo Ato. Qual atitude lógica no camarim?", opts: ["Dobrar a roupa devagar", "Conversar com as amigas", "Deixar o novo figurino já aberto e na ordem de vestir antes de o espetáculo começar", "Procurar a roupa na hora"], ans: 2, exp: "Planejamento prévio! A 'troca rápida' exige que a roupa esteja armada e pronta para vestir." },

                { q: "Durante o espetáculo 'Moinhos' da EDISCA, a música parou acidentalmente. Como o elenco bem ensaiado deve reagir logicamente?", opts: ["Parar e olhar para a coxia", "Sair do palco chorando", "Continuar dançando no silêncio mantendo a contagem mental em grupo", "Sentar no chão"], ans: 2, exp: "O show não pode parar. O profissionalismo exige manter a contagem interna até o som voltar." }

        biblioteca: { room: "Biblioteca", npcs: ["Profª Neile", "Profª Thafilla"], icon: "📚",

                { q: "Um livro foi retirado por um aluno que tem prazo de 7 dias para devolver. Ele pegou o livro numa terça-feira. Qual o dia de devolução?", opts: ["Domingo", "Próxima terça-feira", "Sexta-feira", "Próxima quarta-feira"], ans: 1, exp: "Contando 7 dias exatos, o ciclo se fecha no mesmo dia da semana seguinte." },

                { q: "Por que não podemos comer lanches ou beber água perto dos livros do acervo da EDISCA?", opts: ["Para a biblioteca não ficar suja", "Livros não sentem fome", "Farelos atraem insetos que comem papel e líquidos podem manchar e destruir as páginas", "Para o bibliotecário não ver"], ans: 2, exp: "Preservação patrimonial. Livros são frágeis e os resíduos orgânicos os destroem rapidamente." },

        jardim: { room: "Manutenção e Zelo", npcs: ["Profª Fátima", "Prof. João", "Prof. Igor", "Prof. Clemilson"], icon: "🌱",

            questions: [
                { q: "Para lavar o pátio externo, a equipe utiliza baldes no lugar da mangueira aberta. Qual é a lógica sustentável dessa atitude?", opts: ["Para demorar mais o serviço", "Evitar o desperdício de água, preservando um recurso natural e economizando dinheiro da ONG", "Porque a mangueira quebrou", "Apenas por costume"], ans: 1, exp: "A mangueira aberta gasta centenas de litros. O uso consciente de água é um pilar da responsabilidade social." },
                { q: "A coleta seletiva na escola tem as cores: Azul (Papel), Vermelho (Plástico) e Orgânico (Marrom). Onde você joga o copinho de água vazio e a casca de banana, respectivamente?", opts: ["Vermelho e Azul", "Azul e Marrom", "Vermelho e Marrom", "Tudo no Azul"], ans: 2, exp: "Plástico (copinho) vai no vermelho. Restos de comida (casca) vão no marrom (orgânico)." },
                { q: "Varremos a escola de cima para baixo (do último andar para o térreo). Por que usar essa lógica na faxina?", opts: ["Porque é mais fácil descer escadas", "Para a sujeira dos andares de cima não cair nas áreas inferiores já limpas", "Para não cansar as pernas", "Por estética"], ans: 1, exp: "A gravidade faz com que a poeira sempre desça. Começar de cima garante que o trabalho não tenha que ser refeito." },
                { q: "O que acontece logicamente se os educandos deixam papeis picados no chão da sala de dança antes de saírem?", opts: ["O papel some magicamente", "A equipe de limpeza é sobrecarregada, atrasando a liberação da sala para a próxima turma", "Nada, é a função deles", "O chão fica mais bonito"], ans: 1, exp: "Manter a limpeza é dever de todos. Se cada turma sujar sem recolher, o cronograma da escola inteira atrasa." },
                { q: "Um produto de limpeza precisa ser diluído: 1 tampa de produto para 10 litros de água. Se vamos preparar 20 litros, quantas tampas usamos?", opts: ["1 tampa", "2 tampas", "3 tampas", "5 tampas"], ans: 1, exp: "Mantendo a proporção, se dobramos a quantidade de água, dobramos o produto: 2 tampas." }

        saude: { room: "Saúde", npcs: ["Profª Lorena", "Profª Livia"], icon: "❤️",
            intro: "Saúde física e mental em primeiro lugar! Somos as Professoras Lorena e Livia. Cuidamos das lesões e do bem-estar psicológico de nossos talentos. Resolvam esses casos clínicos!",
            questions: [
                { q: "Um bailarino torceu o fluxo no tornozelo na aula. Para estancar o inchaço nos primeiros 15 minutos, a fisioterapia aplica:", opts: ["Bolsa de água quente", "Gelo (crioterapia)", "Massagear com força", "Mandar ele voltar a dançar"], ans: 1, exp: "O gelo contrai os vasos sanguíneos, diminuindo imediatamente a inflamação e a dor no momento do trauma." },
                { q: "Na psicologia escolar, um aluno chega chorando muito por um problema familiar. Qual é a primeira etapa do atendimento?", opts: ["Dar conselhos rápidos e mandar voltar para a aula", "Ouvir ativamente e oferecer um espaço seguro de acolhimento emocional", "Brigar com o aluno", "Ignorar e falar de dança"], ans: 1, exp: "A escuta ativa e o acolhimento sem julgamentos formam a base do suporte psicológico na EDISCA." },
                { q: "O ensaio do espetáculo é intenso e dura 4 horas. A sala é quente. O que deve ser feito logisticamente para evitar desidratação e cãibras?", opts: ["Beber apenas no final das 4h", "Paradas curtas e programadas para ingestão de água", "Beber 3 litros de uma vez", "Comer salgado"], ans: 1, exp: "A hidratação constante mantém os músculos oxigenados e previne lesões durante o esforço extremo." },
                { q: "Qual postura corporal é ensinada na fisioterapia para proteger a coluna de uma costureira ou funcionário que trabalha muito tempo sentado?", opts: ["Sentar na ponta da cadeira com os ombros curvados", "Apoiar a lombar no encosto e manter os pés no chão", "Cruzar as pernas o dia todo", "Sentar no chão"], ans: 1, exp: "A ergonomia (pés apoiados e coluna reta) distribui o peso do corpo e evita compressões na coluna vertebral." },
                { q: "Se a psicologia foca na mente e a fisioterapia no corpo, o que significa a expressão 'cuidado integral' praticada na EDISCA?", opts: ["Cuidar de um de cada vez em anos diferentes", "Entender que o sofrimento mental pode gerar dor física, e tratar o educando como um todo", "Apenas focar na dança", "Apenas medicar"], ans: 1, exp: "Corpo e mente estão interligados. A ansiedade pode tencionar o corpo e causar lesões físicas, por isso o cuidado é integrado." }

        ti: { room: "Sala de TI", npcs: ["Prof. Vinicius"], icon: "💻",
            intro: "Olá! Sou o Professor Vinicius, responsável pelo setor de TI da EDISCA. Eu cuido da rede de internet, segurança cibernética e de todos os computadores que ajudam a nossa instituição a voar alto. Vamos arrumar a rede?",
            questions: [
                { q: "Um computador da secretaria perdeu a conexão com a internet, enquanto o restante da escola navega normalmente. Qual o primeiro passo de suporte lógico?", opts: ["Reinstalar o sistema operacional", "Verificar se o cabo de rede está firmemente conectado atrás do computador", "Ligar para a provedora reclamando de queda total", "Comprar uma máquina nova"], ans: 1, exp: "A verificação das conexões físicas de cabo e Wi-Fi locais deve anteceder qualquer formatação ou análise complexa." },
                { q: "Para garantir a integridade dos dados dos alunos contra ataques e vírus invasores na rede da EDISCA, qual ferramenta deve ser mantida ativa?", opts: ["Calculadora", "Navegador em modo privado", "Antivírus e Firewall atualizados", "Software de edição de imagem"], ans: 2, exp: "O Antivírus combinado ao Firewall ativo previne, detecta e bloqueia ameaças digitais que tentam infectar os computadores." },
                { q: "O setor financeiro precisa garantir que as planilhas e relatórios vitais da EDISCA não sejam perdidos em caso de falha do computador. O que recomenda?", opts: ["Salvar tudo na lixeira para ocultar", "Configurar backups automáticos diários em nuvem protegida", "Anotar tudo em guardanapos", "Deixar o computador ligado para sempre"], ans: 1, exp: "Backups frequentes e automáticos na nuvem garantem que os dados históricos da ONG estejam seguros de acidentes técnicos." },
                { q: "A secretaria recebe um e-mail com o título 'Urgente: Altere sua senha clicando neste link' enviado por um endereço desconhecido. O que fazer?", opts: ["Clicar correndo e digitar a senha de administrador", "Não clicar, alertar o Prof. Vinicius de TI e marcar como spam/phishing", "Encaminhar para o grupo de pais", "Excluir o computador"], ans: 1, exp: "Ataques de Phishing tentam enganar usuários com urgências falsas. Desconfie, não clique e acione o suporte de TI." },
                { q: "Se temos um plano de banda de internet de 600 Megas e precisamos distribuí-la igualmente entre 6 salas com computadores de aula. Quanto cada sala recebe?", opts: ["50 Megas", "100 Megas", "150 Megas", "600 Megas"], ans: 1, exp: "Dividindo 600 Megas de banda por 6 setores, obtemos 100 Megas por setor para garantir conectividade estável para todos." }
            ]},
        brecho: { room: "Brechó Segundo Ato", npcs: ["Profª Marina", "Prof. Pedro"], icon: "🛍️",

                { q: "A filosofia do nosso Brechó Segundo Ato é fortemente focada em moda sustentável. Ela se apoia em quais conceitos fundamentais?", opts: ["Acumular, ostentar e descartar", "Reduzir o consumo desenfreado, Reutilizar peças e Reciclar materiais", "Copiar, costurar e raspar", "Esquecer, perder e comprar"], ans: 1, exp: "Reduzir, Reutilizar e Reciclar formam a base da economia circular e sustentável praticada em nosso brechó." },
                { q: "Todo o dinheiro arrecadado com as vendas diárias das peças do Brechó Segundo Ato é revertido para:", opts: ["Comprar itens de luxo para a secretaria", "Financiar passagens, sapatilhas, figurinos e lanches para as apresentações de vocês", "A conta pessoal da gerência", "Dividir igualmente entre marcas famosas"], ans: 1, exp: "O brechó é uma iniciativa social. Todo o lucro alimenta diretamente o sonho e o desenvolvimento dos nossos educandos." }

    // ==========================================================================
    // SISTEMA DE INPUT (COMPATIBILIDADE MULTI-TOQUE MOBILE SEM CONFLITOS DE EVENTO)
    // ==========================================================================
    function setupInput() {
        const setKey = (k, state) => {
            if (k === "ArrowUp" || k === "w") keys.up = state;
            if (k === "ArrowDown" || k === "s") keys.down = state;
            if (k === "ArrowLeft" || k === "a") keys.left = state;
            if (k === "ArrowRight" || k === "d") keys.right = state;
            if (k === " " || k === "Enter") { keys.action = state; if(state) checkInteraction(); }
        };
        window.addEventListener("keydown", e => setKey(e.key, true));
        window.addEventListener("keyup", e => setKey(e.key, false));

        const touchMappings = [
            { id: "btn-up", key: "up" },
            { id: "btn-down", key: "down" },
            { id: "btn-left", key: "left" },
            { id: "btn-right", key: "right" }
        ];

        touchMappings.forEach(mapping => {
            const btn = document.getElementById(mapping.id);
            if (btn) {
                // Impede o comportamento padrão de zoom e rolagem no mobile de forma focada e limpa
                btn.addEventListener("touchstart", (e) => {
                    e.preventDefault();
                    keys[mapping.key] = true;
                }, { passive: false });

                btn.addEventListener("touchend", (e) => {
                    e.preventDefault();
                    keys[mapping.key] = false;
                }, { passive: false });

                btn.addEventListener("touchcancel", (e) => {
                    e.preventDefault();
                    keys[mapping.key] = false;
                }, { passive: false });

                // Eventos de Mouse como Fallback para testes rápidos ou híbridos
                btn.addEventListener("mousedown", (e) => {
                    keys[mapping.key] = true;
                });
                btn.addEventListener("mouseup", (e) => {
                    keys[mapping.key] = false;
                });
                btn.addEventListener("mouseleave", (e) => {
                    keys[mapping.key] = false;
                });
            }
        });

        const actionBtn = document.getElementById("btn-action");
        if (actionBtn) {
            actionBtn.addEventListener("touchstart", (e) => {
                e.preventDefault();
                checkInteraction();
            }, { passive: false });

            actionBtn.addEventListener("mousedown", (e) => {
                checkInteraction();
            });
        }
    }

    function checkCollision(nx, ny) {
        const pad = 2; 
        const c1 = Math.floor((nx+pad) / TILE), c2 = Math.floor((nx + player.width - pad) / TILE);
        const r1 = Math.floor((ny+pad) / TILE), r2 = Math.floor((ny + player.height - pad) / TILE);
        for (let r = r1; r <= r2; r++) {
            for (let c = c1; c <= c2; c++) {
                if (!map[r] || map[r][c] === 1 || map[r][c] === 4) return true;
            }
        }
        return false;
    }

    function updatePhysics() {
        if (document.getElementById("dialog-overlay").style.display === "flex") return;

        let dx = 0, dy = 0;
        if (keys.up) dy = -player.speed;
        if (keys.down) dy = player.speed;
        if (keys.left) dx = -player.speed;
        if (keys.right) dx = player.speed;

        // Movimento suavizado em 8 direções com colisão individualizada por eixo
        if (dx !== 0 && !checkCollision(player.x + dx, player.y)) player.x += dx;
        if (dy !== 0 && !checkCollision(player.x, player.y + dy)) player.y += dy;

        camX = Math.max(0, Math.min(player.x - canvas.width / 2, MAP_W - canvas.width));
        camY = Math.max(0, Math.min(player.y - canvas.height / 2, MAP_H - canvas.height));

        checkProximity();
        updateParticles();
    }

    function updateParticles() {
        // Atualização de partículas estéticas do ecossistema
        leafParticles.forEach(p => {
            p.x += p.speedX;
            p.y += p.speedY;
            if (p.x > MAP_W) p.x = 0;
            if (p.y > MAP_H) p.y = 0;
        });

        butterflyParticles.forEach(p => {
            p.x += p.speedX + Math.sin(Date.now() / 300) * 0.2;
            p.y += p.speedY + Math.cos(Date.now() / 300) * 0.2;
            p.wingCycle += 0.2;
            if (p.x < 0) p.x = MAP_W;
            if (p.x > MAP_W) p.x = 0;
            if (p.y < 0) p.y = MAP_H;
            if (p.y > MAP_H) p.y = 0;
        });

        birdParticles.forEach(p => {
            p.x += p.speed;
            p.wing = Math.sin(Date.now() / 50);
            if (p.x > MAP_W) {
                p.x = -50;
                p.y = Math.random() * 15 * TILE;
            }
        });
    }

    }

    function startChallenge(npcKey) {
        const data = questsData[npcKey];
        const qIndex = questState[npcKey].currentQ;

        q.opts.forEach((opt, idx) => {
            html += `<button class="option-btn" onclick="answer('${npcKey}', ${idx}, ${q.ans}, '${q.exp.replace(/'/g, "\\'")}')">${opt}</button>`;
        });
        document.getElementById("dialog-content").innerHTML = html;
        document.getElementById("dialog-actions").innerHTML = "";
    }

    function answer(npcKey, selected, correct, exp) {
        const state = questState[npcKey];
        let c = document.getElementById("dialog-content"), a = document.getElementById("dialog-actions");
        if (selected === correct) {
            player.score += 20; document.getElementById("hud-score").innerText = `⭐ ${player.score}`;
            c.innerHTML = `<h3 style="color:#4ecdc4;">✨ Brilhante! É assim que se faz.</h3><p style="margin-top:10px;">${exp}</p>`;
            state.currentQ++;
            if (state.currentQ >= 5) {
                state.completed = true;
                a.innerHTML = `<button class="game-btn" style="background:#ffe66d; color:#292f36;" onclick="earnMedal('${npcKey}')">Receber Selo</button>`;
            } else { a.innerHTML = `<button class="game-btn" onclick="startChallenge('${npcKey}')">Próxima Situação</button>`; }
        } else {
            c.innerHTML = `<h3 style="color:#ff6b6b;">❌ Atenção!</h3><p>Esse não é o procedimento correto para a nossa rotina. Pense em como as coisas funcionam aqui e tente novamente!</p>`;
            a.innerHTML = `<button class="game-btn" onclick="startChallenge('${npcKey}')">Tentar Novamente</button>`;
        }
    }

    // ==========================================================================
    function drawSign(x, y, text) {
        ctx.save();
        ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetY = 3;

        ctx.font = "bold 11px 'Courier New'";
        let textW = ctx.measureText(text).width;
        let boxW = Math.max(textW + 16, 60); 
        let offset = (boxW - 60) / 2;
        
        // Estilo placa de madeira entalhada tradicional de ilhas retro
        ctx.fillStyle = "#5c2d16"; 
        ctx.fillRect(x - offset, y, boxW, 20); 
        ctx.fillStyle = "#a16207"; 
        ctx.fillRect(x - offset + 2, y + 2, boxW - 4, 16);
        ctx.fillStyle = "#3b1e0f"; 
        ctx.fillRect(x + 25, y + 20, 10, 15);
        
        ctx.fillStyle = "#fff"; ctx.textAlign = "center";
        ctx.fillText(text, x + 30 - offset + (boxW/2), y + 14);
        ctx.restore();
    }

    // Desenha decorações internas baseadas no tipo de sala (Mapeamento do TILE 3)
    function drawIndoorDecor(tx, ty, r, c) {
        // Encontra em qual faixa de sala estamos para desenhar o background decorativo correspondente
        ctx.save();
        
        // Chão de Madeira das Salas
        ctx.fillStyle = "#b45309";
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = "#78350f";
        ctx.fillRect(tx, ty + TILE - 2, TILE, 2); // Textura de tábuas

        // Identifica sala por faixas de colunas/linhas para criar cenários temáticos
        if (r >= 17 && r <= 24) { // TI (c: 22-29), Secretaria (10-20), Diretoria (50-60), Brechó (41-48)
            if (c >= 22 && c <= 29) { // Sala de TI: Servidores e computadores
                if (r === 18 && c % 2 === 0) {
                    ctx.fillStyle = "#334155"; ctx.fillRect(tx + 5, ty + 5, 30, 25);
                    ctx.fillStyle = "#10b981"; ctx.fillRect(tx + 8, ty + 10, 4, 4); // Leds ativos
                    ctx.fillStyle = "#38bdf8"; ctx.fillRect(tx + 18, ty + 20, 12, 6); // Monitor
                }
            } else if (c >= 10 && c <= 20) { // Secretaria: Arquivos e guias
                if (r === 18 && c % 3 === 0) {
                    ctx.fillStyle = "#64748b"; ctx.fillRect(tx + 8, ty + 2, 24, 30);
                    ctx.fillStyle = "#94a3b8"; ctx.fillRect(tx + 12, ty + 8, 16, 4); // Gavetas
                    ctx.fillRect(tx + 12, ty + 16, 16, 4);
                }
            } else if (c >= 50 && c <= 60) { // Diretoria: Mesa executiva, plantas e quadros
                if (r === 18 && c === 52) { // Vaso de planta
                    ctx.fillStyle = "#b45309"; ctx.fillRect(tx + 12, ty + 20, 16, 16);
                    ctx.fillStyle = "#047857"; ctx.beginPath(); ctx.arc(tx + 20, ty + 12, 10, 0, Math.PI * 2); ctx.fill();
                }
                if (r === 18 && c === 56) { // Quadro de honra na parede
                    ctx.fillStyle = "#facc15"; ctx.fillRect(tx + 10, ty + 2, 20, 16);
                    ctx.fillStyle = "#fff"; ctx.fillRect(tx + 12, ty + 4, 16, 12);
                    ctx.fillStyle = "#000"; ctx.fillRect(tx + 15, ty + 8, 10, 2);
                }
            } else if (c >= 41 && c <= 48) { // Brechó: Roupas suspensas e caixas
                if (r === 18 && c % 2 === 0) {
                    ctx.fillStyle = "#475569"; ctx.fillRect(tx + 2, ty + 10, 36, 6); // Arara
                    ctx.fillStyle = "#ec4899"; ctx.fillRect(tx + 8, ty + 16, 8, 18); // Cabides com roupas
                    ctx.fillStyle = "#3b82f6"; ctx.fillRect(tx + 22, ty + 16, 8, 18);
                }
            }
        } else if (r >= 29 && r <= 36) { // Cozinha (10-20), Reforço (50-60), Mkt (22-29), Refeitório (41-48)
            if (c >= 10 && c <= 20) { // Cozinha: Fogões e pias
                if (r === 30 && c % 3 === 0) {
                    ctx.fillStyle = "#cbd5e1"; ctx.fillRect(tx + 4, ty + 6, 32, 28);
                    ctx.fillStyle = "#ef4444"; ctx.fillRect(tx + 8, ty + 10, 8, 6); // Fogo simulado
                }
            } else if (c >= 50 && c <= 60) { // Reforço: Carteiras e Quadro Negro
                if (r === 30 && c === 55) { // Quadro Negro gigante central
                    ctx.fillStyle = "#0f172a"; ctx.fillRect(tx - 20, ty + 2, 80, 24);
                    ctx.strokeStyle = "#b45309"; ctx.lineWidth = 3; ctx.strokeRect(tx - 20, ty + 2, 80, 24);
                    ctx.fillStyle = "#fff"; ctx.font = "8px Arial"; ctx.fillText("2+2=4", tx + 5, ty + 15);
                }
            } else if (c >= 22 && c <= 29) { // Marketing: Painel criativo e banners
                if (r === 30 && c % 2 === 0) {
                    ctx.fillStyle = "#f97316"; ctx.fillRect(tx + 6, ty + 4, 28, 22); // Painel de post-it
                    ctx.fillStyle = "#fef08a"; ctx.fillRect(tx + 10, ty + 8, 6, 6);
                    ctx.fillStyle = "#67e8f9"; ctx.fillRect(tx + 20, ty + 14, 6, 6);
                }
            } else if (c >= 41 && c <= 48) { // Refeitório: Mesas de alimentação
                if (r % 2 === 0 && c % 2 === 0) {
                    ctx.fillStyle = "#f59e0b"; ctx.fillRect(tx + 5, ty + 5, 30, 20); // Mesa
                    ctx.fillStyle = "#78350f"; ctx.fillRect(tx + 12, ty + 25, 16, 10); // Bancada
                }
            }
        } else if (r >= 41 && r <= 48) { // Financeiro (10-20), Artes (50-60)
            if (c >= 10 && c <= 20) { // Financeiro: Cofre e Calculadoras
                if (r === 42 && c === 15) {
                    ctx.fillStyle = "#475569"; ctx.fillRect(tx + 8, ty + 5, 24, 28); // Cofre
                    ctx.fillStyle = "#94a3b8"; ctx.beginPath(); ctx.arc(tx + 20, ty + 18, 6, 0, Math.PI * 2); ctx.fill(); // Segredo
                }
            } else if (c >= 50 && c <= 60) { // Artes: Telas de pintura e pincéis
                if (r === 42 && c % 3 === 0) {
                    ctx.fillStyle = "#d97706"; ctx.fillRect(tx + 12, ty + 15, 16, 20); // Cavalete
                    ctx.fillStyle = "#f8fafc"; ctx.fillRect(tx + 6, ty + 5, 28, 16); // Tela branca
                    ctx.fillStyle = "#ec4899"; ctx.beginPath(); ctx.arc(tx + 15, ty + 12, 4, 0, Math.PI * 2); ctx.fill(); // Mancha artística
                }
            }
        } else if (r >= 53 && r <= 60) { // Dança (20-30), Teatro (40-50), Saúde (5-15), Biblioteca (55-65)
            if (c >= 20 && c <= 30) { // Dança: Espelhos e barras
                if (r === 54) {
                    ctx.fillStyle = "#e2e8f0"; ctx.fillRect(tx, ty + 2, TILE, 16); // Espelho corrido
                    ctx.fillStyle = "#b45309"; ctx.fillRect(tx, ty + 22, TILE, 3); // Barra de madeira
                }
            } else if (c >= 40 && c <= 50) { // Teatro: Ribalta e Cortinas vermelhas
                if (r === 54) {
                    ctx.fillStyle = "#991b1b"; ctx.fillRect(tx, ty, TILE, 32); // Cortinado denso vermelho
                    ctx.fillStyle = "#facc15"; ctx.beginPath(); ctx.arc(tx + 20, ty + 36, 4, 0, Math.PI*2); ctx.fill(); // Refletores
                }
            } else if (c >= 5 && c <= 15) { // Saúde: Maca médica acolhedora e divisórias
                if (r === 54 && c === 10) {
                    ctx.fillStyle = "#f1f5f9"; ctx.fillRect(tx + 4, ty + 10, 32, 16); // Maca
                    ctx.fillStyle = "#38bdf8"; ctx.fillRect(tx + 4, ty + 6, 10, 4); // Travesseiro azul suave
                }
            } else if (c >= 55 && c <= 65) { // Biblioteca: Estantes de livros empilhados
                if (r === 54 && c % 2 === 0) {
                    ctx.fillStyle = "#78350f"; ctx.fillRect(tx + 4, ty + 2, 32, 36); // Estante
                    ctx.fillStyle = "#3b82f6"; ctx.fillRect(tx + 8, ty + 6, 6, 8); // Livros coloridos
                    ctx.fillStyle = "#ef4444"; ctx.fillRect(tx + 14, ty + 6, 6, 8);
                    ctx.fillStyle = "#10b981"; ctx.fillRect(tx + 22, ty + 6, 6, 8);
                }
            }
        }
        ctx.restore();
    }

    // FUNÇÃO ORIGINAL DE DESENHO DE PERSONAGENS DO SEU CÓDIGO FONTE (Efeito Respiração adicionado de forma dinâmica e sutil)
    function drawCharacter(x, y, skin, shirt, pants, hair, hStyle, glasses, isHero) {
        ctx.save();
        // Adiciona um micro-bounce sutil de respiração para simular vida mesmo parado
        let breathe = !isHero ? Math.sin(Date.now() / 350 + x) * 0.4 : 0;
        
        ctx.translate(0, breathe);
        ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath(); ctx.ellipse(x+12, y+36, 12, 4, 0, 0, Math.PI*2); ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = "#111";

        if(isHero) {
            ctx.fillStyle = "#18181b"; ctx.fillRect(x+6, y+14, 12, 14); ctx.strokeRect(x+6, y+14, 12, 14);
            ctx.fillStyle = skin; ctx.fillRect(x+6, y+28, 4, 10); ctx.strokeRect(x+6, y+28, 4, 10);
            ctx.fillRect(x+14, y+28, 4, 10); ctx.strokeRect(x+14, y+28, 4, 10);
            ctx.fillStyle = "#fef08a"; ctx.fillRect(x+5, y+35, 6, 4); ctx.fillRect(x+13, y+35, 6, 4);
            ctx.fillStyle = skin; ctx.fillRect(x+2, y+15, 4, 12); ctx.strokeRect(x+2, y+15, 4, 12);
            ctx.fillRect(x+18, y+15, 4, 12); ctx.strokeRect(x+18, y+15, 4, 12);
        } else {
            ctx.fillStyle = pants; ctx.fillRect(x+6, y+26, 4, 10); ctx.strokeRect(x+6, y+26, 4, 10);
            ctx.fillRect(x+14, y+26, 4, 10); ctx.strokeRect(x+14, y+26, 4, 10);
            ctx.fillStyle = "#000"; ctx.fillRect(x+5, y+34, 6, 4); ctx.fillRect(x+13, y+34, 6, 4);
            ctx.fillStyle = shirt; ctx.fillRect(x+5, y+14, 14, 13); ctx.strokeRect(x+5, y+14, 14, 13);
            ctx.fillStyle = shirt; ctx.fillRect(x+1, y+14, 4, 6); ctx.fillRect(x+19, y+14, 4, 6);
            ctx.fillStyle = skin; ctx.fillRect(x+1, y+20, 4, 6); ctx.strokeRect(x+1, y+20, 4, 6);
            ctx.fillRect(x+19, y+20, 4, 6); ctx.strokeRect(x+19, y+20, 4, 6);
        }

        ctx.fillStyle = skin; ctx.fillRect(x+6, y+2, 12, 12); ctx.strokeRect(x+6, y+2, 12, 12);
        
        // Simula efeito de piscar de olhos ocasionalmente para humanizar
        let isBlinking = (Math.floor(Date.now() / 2000) % 2 === 0) && (Math.floor(Date.now() / 100) % 15 === 0);
        if (isBlinking) {
            ctx.fillStyle = "#111";
            ctx.fillRect(x+8, y+8, 2, 1); ctx.fillRect(x+14, y+8, 2, 1);
        } else {
            ctx.fillStyle = "#000"; ctx.fillRect(x+8, y+7, 2, 3); ctx.fillRect(x+14, y+7, 2, 3);
        }

        if(glasses) {
            ctx.strokeStyle = "#4b5563"; ctx.lineWidth = 1;
            ctx.strokeRect(x+7, y+6, 4, 4); ctx.strokeRect(x+13, y+6, 4, 4);
            ctx.beginPath(); ctx.moveTo(x+11, y+8); ctx.lineTo(x+13, y+8); ctx.stroke();
        }

        ctx.fillStyle = hair;
        if(hStyle === 1) { 
            ctx.fillRect(x+5, y, 14, 4); 
            ctx.fillRect(x+5, y+4, 2, 4); ctx.fillRect(x+17, y+4, 2, 4);
        } else if (hStyle === 2) { 
            ctx.fillRect(x+4, y-2, 16, 6);
            ctx.fillRect(x+4, y+4, 3, 10); ctx.fillRect(x+17, y+4, 3, 10);
        } else if (hStyle === 3) { 
            ctx.fillRect(x+5, y, 14, 4);
            ctx.beginPath(); ctx.arc(x+12, y, 4, 0, Math.PI*2); ctx.fill(); 
        }
        ctx.restore();
    }

    function draw() {
        ctx.fillStyle = "#11141a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(Math.floor(-camX), Math.floor(-camY));

        const c1 = Math.max(0, Math.floor(camX / TILE)), c2 = Math.min(COLS - 1, Math.floor((camX + canvas.width) / TILE));
        const r1 = Math.max(0, Math.floor(camY / TILE)), r2 = Math.min(ROWS - 1, Math.floor((camY + canvas.height) / TILE));

        // Efeito de ondulação da grama pelo vento de forma unificada
        let windGrassOffset = Math.sin(Date.now() / 600) * 2;

        for (let r = r1; r <= r2; r++) {
            for (let c = c1; c <= c2; c++) {
                let tx = c * TILE, ty = r * TILE, type = map[r][c];
                
                if (type === 0) { 
                    // Gramado natural texturizado
                    ctx.fillStyle = (r+c) % 2 === 0 ? "#558b2f" : "#689f38"; 
                    ctx.fillRect(tx, ty, TILE, TILE); 
                    
                    // Pequenas flores e arbustos decorativos dispersos
                    if ((r * c) % 17 === 0) {
                        ctx.fillStyle = "#fef08a"; // Miolo da flor
                        ctx.fillRect(tx + 12 + windGrassOffset, ty + 12, 3, 3);
                        ctx.fillStyle = "#f87171"; // Pétala
                        ctx.fillRect(tx + 10 + windGrassOffset, ty + 10, 2, 2);
                        ctx.fillRect(tx + 15 + windGrassOffset, ty + 10, 2, 2);
                    } else if ((r * c) % 23 === 0) {
                        // Pequenas folhas secas ou ramos caídos
                        ctx.fillStyle = "#2e7d32";
                        ctx.fillRect(tx + 8 + windGrassOffset, ty + 20, 5, 2);
                    }
                }
                else if (type === 1) { 
                    // Paredes e fachada exterior da escola com profundidade e telhado
                    ctx.fillStyle = "#1e293b"; ctx.fillRect(tx, ty, TILE, TILE); 
                    
                    // Sombras de profundidade e beiral
                    ctx.fillStyle = "#0f172a"; ctx.fillRect(tx, ty, TILE, 8); 
                    
                    // Beiral estético de telha no topo
                    ctx.fillStyle = "#f87171"; ctx.fillRect(tx, ty - 6, TILE, 6);
                    ctx.fillStyle = "#dc2626"; ctx.fillRect(tx, ty - 4, TILE, 2);
                    
                    // Janelas detalhadas
                    if (c % 2 === 0) {
                        ctx.fillStyle = "#38bdf8"; ctx.fillRect(tx + 10, ty + 12, 20, 16);
                        ctx.fillStyle = "#e0f2fe"; ctx.fillRect(tx + 12, ty + 14, 6, 12); // Reflexo do sol nas janelas
                    }
                }
                else if (type === 2) { 
                    // Caminhos texturizados orgânicos com pequenas bordas de pedra
                    ctx.fillStyle = "#c27829"; ctx.fillRect(tx, ty, TILE, TILE); 
                    
                    // Variações e imperfeições estéticas na estrada (terra e marcas de uso)
                    ctx.fillStyle = "#a15c1b";
                    if ((r+c)%3 === 0) ctx.fillRect(tx + 5, ty + 8, 4, 4);
                    if ((r+c)%5 === 0) ctx.fillRect(tx + 22, ty + 18, 6, 3);
                    
                    // Pequenas pedrinhas cinzas integradas nas margens do caminho
                    if ((r * c) % 19 === 0) {
                        ctx.fillStyle = "#94a3b8";
                        ctx.beginPath(); ctx.ellipse(tx + 15, ty + 15, 4, 2, 0, 0, Math.PI*2); ctx.fill();
                    }
                } 
                else if (type === 3) { 
                    // Interior das salas decoradas com objetos ricos
                    drawIndoorDecor(tx, ty, r, c);
                }
                else if (type === 4) { 
                    // Água com ondas e brilhos suaves
                    ctx.fillStyle = "#0284c7"; ctx.fillRect(tx, ty, TILE, TILE); 
                    let w = Math.sin(Date.now() / 400 + c) * 3; 
                    ctx.fillStyle = "#38bdf8"; 
                    ctx.fillRect(tx + 5, ty + 12 + w, 22, 3); 
                }
            }
        }

        // Desenho das placas de identificação com visualização aprimorada
        for(let key in npcLocations) {
            drawSign(npcLocations[key].x - 15, npcLocations[key].y - 32, questsData[key].room);
        }

        // Desenhar múltiplos NPCs preservando seus bounces e espaçamentos individuais originais
        for (let key in npcLocations) {
            let loc = npcLocations[key];
            let count = loc.npcs.length;
            let bounce = Math.sin(Date.now() / 200 + loc.x) * 2;
            let spacing = 16;
            let startX = loc.x - ((count - 1) * spacing) / 2;
            
            for (let i = 0; i < count; i++) {
                let n = loc.npcs[i];
                drawCharacter(startX + (i * spacing), loc.y + bounce + (i % 2 * 2), n.skin, n.shirt, n.pants, n.hair, n.hStyle, n.glasses, false);
            }

            if (!questState[key].completed) {
                ctx.fillStyle = "#ffe66d"; ctx.font = "bold 24px Arial"; ctx.fillText("!", loc.x + 8, loc.y - 15 + bounce);
            }
        }

        let bob = (keys.up || keys.down || keys.left || keys.right) ? Math.sin(Date.now() / 80) * 3 : 0;
        drawCharacter(player.x, player.y + bob, "#ffdbac", "#18181b", "#18181b", "#292524", 3, false, true);

        // Renderização dos elementos estéticos e partículas do ambiente
        ctx.save();
        leafParticles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });

        butterflyParticles.forEach(p => {
            ctx.fillStyle = p.color;
            let wing = Math.sin(p.wingCycle) * 3;
            ctx.fillRect(p.x - wing, p.y, 3, 3);
            ctx.fillRect(p.x + 1 + wing, p.y, 3, 3);
        });

        birdParticles.forEach(p => {
            ctx.fillStyle = "#334155";
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + 5, p.y - 3 + p.wing * 3);
            ctx.lineTo(p.x + 10, p.y);
            ctx.stroke();
        });
        ctx.restore();

        ctx.restore();
    }

    function loop() {
        updatePhysics();
        draw();
        requestAnimationFrame(loop);
    }

    function startGame() {
        let name = document.getElementById("player-name").value.trim();
        if(name) player.name = name;
        document.getElementById("hud-name").innerText = player.name;
        
        document.getElementById("start-screen").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("hud").style.display = "flex";
            document.getElementById("tutorial-hud").style.display = "block";
            if (window.innerWidth < 800) document.getElementById("controls").style.display = "flex";
        }, 500);

        initMap();
        initAmbientParticles();
        setupInput();
        requestAnimationFrame(loop);
    }
</script>

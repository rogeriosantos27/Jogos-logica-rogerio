<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Mostra Coreografica</title>
    <style>
        /* Reset básico */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Libera a rolagem vertical e garante altura mínima */
        body, html {
            min-height: 100vh;
            background-color: #000;
        }

        /* Container Principal com adaptação para rolagem */
        #quiz-container {
            min-height: 100vh;
            width: 100%;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed; /* O fundo fica fixo enquanto o conteúdo rola */
            position: relative;
            transition: background-image 0.5s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5vh 5%; /* Garante espaço nas bordas em telas pequenas */
        }

        /* Camada escura de transparência fixa na tela toda */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* Moldura tracejada flexível (cresce junto com o texto) */
        #inner-frame {
            position: relative;
            width: 100%;
            max-width: 1000px;
            border: 2px dashed rgba(255, 255, 255, 0.7);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.2); /* Leve escurecimento extra dentro da caixa para leitura */
            border-radius: 8px;
        }

        /* Caixa de conteúdo */
        #content-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Texto da Pergunta */
        #question-text {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 40px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        /* Container das alternativas */
        #alternatives-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
        }

        /* Estilo Ghost Button para as respostas */
        .alternative-btn {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1 1 auto;
            min-width: 200px; /* Garante tamanho legível */
        }

        .alternative-btn:hover:not(.disabled) {
            background-color: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
            transform: scale(1.02);
        }

        /* Ícones de feedback visual */
        .feedback-icon {
            margin-right: 10px;
            font-weight: bold;
            font-size: 1.3rem;
        }

        /* Estados de resposta */
        .correct {
            background-color: rgba(46, 204, 113, 0.3) !important;
            border-color: #2ecc71 !important;
            color: #2ecc71 !important;
        }

        .incorrect {
            background-color: rgba(231, 76, 60, 0.3) !important;
            border-color: #e74c3c !important;
            color: #e74c3c !important;
        }

        .disabled {
            cursor: not-allowed;
            opacity: 0.8;
            pointer-events: none;
        }

        /* Botão de Avançar Pergunta (Ajustado para mobile) */
        #next-btn {
            display: none;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 40px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            margin-top: 10px;
        }

        #next-btn:hover {
            background-color: #dddddd;
        }

        /* Tela de encerramento */
        #final-title {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.9);
            text-align: center;
            letter-spacing: 2px;
        }

        #final-message {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.6;
            max-width: 800px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* ========================================================= */
        /* RESPONSIVIDADE ESTRITA PARA CELULARES                     */
        /* ========================================================= */
        @media (max-width: 768px) {
            #inner-frame { 
                padding: 25px 15px; 
                border-width: 1px; /* Deixa a borda um pouco mais leve no celular */
            }
            #question-text { 
                font-size: 1.3rem; 
                margin-bottom: 25px; 
            }
            #alternatives-container { 
                flex-direction: column; /* Empilha os botões */
                gap: 12px; 
            }
            .alternative-btn { 
                width: 100%; 
                padding: 15px; 
                font-size: 1.1rem; 
                min-height: 60px; /* Alvo de toque mais fácil para os dedos */
            }
            #next-btn { 
                width: 100%; 
                padding: 15px; 
                font-size: 1.2rem; 
            }
            #final-title { 
                font-size: 2.2rem; 
            }
            #final-message { 
                font-size: 1.2rem; 
            }
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <div id="overlay"></div>
        <div id="inner-frame">
            <div id="content-box">
                <div id="question-text">Carregando pergunta...</div>
                <div id="alternatives-container"></div>
                <button id="next-btn">Próxima Pergunta</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Na apresentação de abertura, as crianças usam sombrinhas de Frevo organizadas em um padrão de cores: 🔴 Vermelha, 🔵 Azul, 🔴 Vermelha, 🟡 Amarela, 🔴 Vermelha, 🔵 Azul, 🔴 Vermelha, 🟡 Amarela... Seguindo estritamente essa sequência lógica, qual será a cor da 13ª sombrinha do Frevo?",
                answers: ["Vermelha", "Azul", "Amarela", "Verde"],
                correct: "Vermelha"
            },
            {
                question: "Na festa junina, as barracas de pamonha de três turmas (A, B e C) competiram para ver quem vendia mais. A Barraca A vendeu mais que a Barraca B. A Barraca B não vendeu menos que a Barraca C. Organize as barracas da que vendeu MENOS para a que vendeu MAIS.",
                answers: ["Barraca A, Barraca B, Barraca C", "Barraca C, Barraca B, Barraca A", "Barraca B, Barraca C, Barraca A", "Barraca C, Barraca A, Barraca B"],
                correct: "Barraca C, Barraca B, Barraca A"
            },
            {
                question: "Durante a apresentação de Ciranda, Helen afirmou: 'Formamos uma roda perfeita com 16 crianças. Isso significa que cada um de nós está dando a mão para 16 colegas diferentes ao mesmo tempo!'. Essa afirmação de Helen é:",
                answers: ["Verdadeira", "Falsa"],
                correct: "Falsa"
            },
            {
                question: "Para a dança da Quadrilha, Tio Anderson organizou as crianças em 4 filas, cada uma com exatamente 6 crianças. Depois, ele mudou a estratégia e reorganizou os mesmos alunos em 3 filas com 8 crianças cada. Ele afirmou que todos continuaram dançando e não sobrou ninguém de fora. A afirmação do Tio Anderson é:",
                answers: ["Verdadeira", "Falsa"],
                correct: "Verdadeira"
            },
            {
                question: "No Festival de Parintins, três crianças fizeram afirmações sobre as cores dos bois Garantido e Caprichoso. Kauanny disse: 'Um deles é vermelho e o outro é azul'. Ketlein disse: 'Os dois são vermelhos'. Erislayne disse: 'Os dois são azuis'. Sabendo que apenas UMA criança está certa, quem acertou?",
                answers: ["Kauanny", "Ketlein", "Erislayne"],
                correct: "Kauanny"
            },
            {
                question: "Na dança do Pau de Fita, a cada volta completa em torno do mastro, o número de cruzamentos das fitas dobra e depois soma 1. Observe a sequência, e diga qual será o próximo número: 1 → 3 → 7 → 15 → 31 → ?",
                answers: ["60", "61", "62", "63"],
                correct: "63"
            },
            {
                question: "No dia da mostra, cada turma recebe um número de identificação com 3 algarismos. Tio Jessy deu a seguinte dica: A soma dos três algarismos do número do grupo é 20. Qual dos números abaixo NÃO pode ser o número do grupo?",
                answers: ["866", "867", "587", "956"],
                correct: "867"
            },
            {
                question: "Na coreografia de funk, com cinco bailarinas (Camilly, Clarice, Izabelly, Julia e Beatriz), temos as seguintes informações: 1) Clarice dançou antes de Julia. 2) Izabelly não foi a última. 3) Camilly dançou entre Clarice e Beatriz. Quem foi a última a dançar?",
                answers: ["Clarice", "Beatriz", "Julia"],
                correct: "Beatriz"
            },
            {
                question: "Cinco turmas se apresentaram na mostra coreográfica: Samba, Maracatu, Frevo, Quadrilha Junina e Carimbó. A ordem das apresentações seguiu estas regras: 1) O Samba se apresentou antes do Frevo. 2) O Frevo se apresentou imediatamente antes do Carimbó. 3) A Quadrilha Junina não ficou entre as 3 últimas apresentações. 4) O Maracatu se apresentou antes do Samba. Quais foram as duas primeiras apresentações da mostra?",
                answers: ["A) Maracatu e Samba", "B) Quadrilha Junina e Maracatu", "C) Carimbó e Quadrilha Junina", "D) Quadrilha Junina e Samba"],
                correct: "B) Quadrilha Junina e Maracatu"
            },
            {
                question: "Na coreografia de Maracatu, as bailarinas precisam formar um círculo. Tio Jessy explicou que cada bailarina deve ficar exatamente entre duas colegas. Se há 12 bailarinas na roda, quantas bailarinas cada bailarina consegue ter ao seu lado?",
                answers: ["2", "3", "4"],
                correct: "2"
            },
            {
                question: "Na quadrilha, quatro casais ficaram enfileirados nesta ordem: 🟦 Casal A → 🟥 Casal B → 🟩 Casal C → 🟨 Casal D. Quando o marcador gritou \"Anarriê!\", aconteceu o seguinte: O primeiro casal foi para o último lugar. Todos os outros avançaram uma posição. Quem ficou em segundo lugar?",
                answers: ["Casal A", "Casal B", "Casal C", "Casal D"],
                correct: "Casal C"
            },
            {
                question: "Durante uma coreografia de Frevo, quatro crianças estavam segurando sombrinhas: 🟥 Esther: sombrinha vermelha; 🟦 Sophya: sombrinha azul; 🟨 Ana Sophia : sombrinha amarela; 🟩 Agatha: sombrinha verde. Tia Adrielly fez a seguinte afirmação: \"Se Esther trocar a sombrinha com Sophya e, depois, Sophya trocar a sombrinha com Agatha, então Sophya terminará segurando a sombrinha vermelha.\" Essa afirmação é:",
                answers: ["Verdadeira", "Falsa"],
                correct: "Falsa"
            },
            {
                question: "No grupo de Carimbó, as bailarinas usam saias para entrar na apresentação. Tio Vitor organizou as saias seguindo esta regra: 🔴 Vermelho → 🔵 Azul → 🟢 Verde → 🟡 Amarelo. Ele repetiu essa sequência até distribuir 20 saias. Que cor recebeu a 18ª bailarina?",
                answers: ["🔴 Vermelho", "🔵 Azul", "🟢 Verde", "🟡 Amarelo"],
                correct: "🔵 Azul"
            }
        ];

        let currentQuestionIndex = 0;
        let hasAnswered = false; 
        
        const container = document.getElementById('quiz-container');
        const questionText = document.getElementById('question-text');
        const alternativesContainer = document.getElementById('alternatives-container');
        const nextBtn = document.getElementById('next-btn');

        // Garante que a rolagem volte para o topo ao trocar de pergunta no celular
        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            window.scrollTo(0, 0); 
            loadQuestion();
        });

        function loadQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                showFinalScreen();
                return;
            }

            hasAnswered = false; 
            nextBtn.style.display = 'none'; 

            const currentData = quizData[currentQuestionIndex];
            
            const questionNumber = currentQuestionIndex + 1;
            container.style.backgroundImage = `url('imagem${questionNumber}.jpg')`;

            questionText.innerHTML = currentData.question;
            alternativesContainer.innerHTML = '';

            currentData.answers.forEach(answer => {
                const button = document.createElement('button');
                button.classList.add('alternative-btn');
                button.innerText = answer;
                button.addEventListener('click', () => checkAnswer(button, answer, currentData.correct));
                alternativesContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedButton, selectedAnswer, correctAnswer) {
            if (hasAnswered) return;
            hasAnswered = true; 

            const buttons = document.querySelectorAll('.alternative-btn');
            
            buttons.forEach(btn => {
                btn.classList.add('disabled');
            });

            if (selectedAnswer === correctAnswer) {
                selectedButton.classList.add('correct');
                selectedButton.innerHTML = `<span class="feedback-icon">✓</span> ${selectedAnswer}`;
            } else {
                selectedButton.classList.add('incorrect');
                selectedButton.innerHTML = `<span class="feedback-icon">✕</span> ${selectedAnswer}`;
                
                buttons.forEach(btn => {
                    if (btn.innerText === correctAnswer) {
                        btn.classList.add('correct');
                        btn.innerHTML = `<span class="feedback-icon">✓</span> ${correctAnswer}`;
                    }
                });
            }

            nextBtn.style.display = 'block';
            
            // Rola suavemente para baixo para mostrar o botão no celular, caso tenha ficado oculto
            setTimeout(() => {
                nextBtn.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 200);
        }

        function showFinalScreen() {
            container.style.backgroundImage = "url('imagem14.jpg')";
            
            alternativesContainer.innerHTML = '';
            questionText.style.display = 'none';
            nextBtn.style.display = 'none';

            const finalTitle = document.createElement('div');
            finalTitle.id = 'final-title';
            finalTitle.innerText = "QUIZ COMPLETO!";
            
            const finalMessage = document.createElement('div');
            finalMessage.id = 'final-message';
            finalMessage.innerText = "Cada passo de dança conta uma história, e cada desafio resolvido mostra o quanto você aprendeu. Continue valorizando a cultura brasileira e nunca deixe de aprender com alegria e criatividade. Parabéns!";
            
            const contentBox = document.getElementById('content-box');
            contentBox.appendChild(finalTitle);
            contentBox.appendChild(finalMessage);
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
